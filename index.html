<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Load AI Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --success: #22c55e; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; overflow-x: hidden; }
        .header { background: var(--card); padding: 18px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); font-weight: 800; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .video-box { width: 100%; border-radius: 20px; overflow: hidden; background: #000; line-height: 0; box-shadow: 0 10px 15px rgba(0,0,0,0.1); position: relative; }
        video { width: 100%; height: auto; transform: scaleX(1); } 
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin: 8px 0; }
        .btn-train { background: var(--success); user-select: none; -webkit-user-select: none; }
        .btn-train.active { background: #16a34a; transform: scale(0.95); }
        .price-badge { background: #f0f9ff; padding: 16px; border-radius: 15px; margin-top: 15px; border-left: 6px solid var(--success); animation: slideIn 0.3s ease; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0 25px 0; border-top: 1px solid #e2e8f0; z-index: 100; }
        .nav-item { text-align: center; font-size: 11px; color: #94a3b8; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .hidden { display: none; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .del-btn { background: #fee2e2; color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 11px; width: auto; margin: 0; }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">PRO SCANNER AI</div>
        <div id="load-status">Downloading AI Eyes...</div>
    </div>

    <div class="header">PRO SCANNER AI</div>

    <!-- SCAN SCREEN -->
    <div id="scan-screen" class="container">
        <div class="card">
            <div class="video-box"><video id="v-scan" autoplay playsinline muted></video></div>
            <div id="status" style="text-align:center; margin:15px; font-weight:600; color:#64748b;">Ready</div>
            <div id="result" class="price-badge hidden">
                <div style="color:var(--danger); font-size:12px; font-weight:bold;">BUY: $<span id="d-buy">0</span></div>
                <div style="color:var(--success); font-size:26px; font-weight:900;">SELL: $<span id="d-sell">0</span></div>
                <div id="d-name" style="font-size:16px; font-weight:bold; color:#1e293b;">NAME</div>
            </div>
        </div>
    </div>

    <!-- ADD SCREEN -->
    <div id="add-screen" class="container hidden">
        <div class="card">
            <h3>Add Product</h3>
            <input type="text" id="i-name" placeholder="Product Name">
            <input type="number" id="i-buy" placeholder="Buy Price $">
            <input type="number" id="i-sell" placeholder="Sell Price $">
            <div class="video-box" style="height:150px; margin:10px 0;"><video id="v-train" autoplay playsinline muted></video></div>
            <button class="btn-train" id="t-btn">HOLD TO TRAIN AI</button>
            <button onclick="saveProduct()" style="background:#1e293b;">SAVE EVERYTHING</button>
        </div>
    </div>

    <!-- LIST SCREEN -->
    <div id="list-screen" class="container hidden">
        <div class="card">
            <h3>Inventory</h3>
            <div id="inv-list"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('scan-screen', this)">📷<br>Scan</div>
        <div class="nav-item" onclick="tab('add-screen', this)">➕<br>Add</div>
        <div class="nav-item" onclick="tab('list-screen', this)">📦<br>Items</div>
    </div>

    <script>
        // 1. REGISTER SERVICE WORKER FOR OFFLINE USE
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Speed Bump", err));
        }

        let classifier, net, inventory = {}, isTraining = false, scanActive = true;
        const vScan = document.getElementById('v-scan'), vTrain = document.getElementById('v-train');

        // 2. INDEXED DB LOGIC (THE BRAIN)
        const dbName = "ScannerAI_DB", storeName = "MainStore";
        async function accessDB(mode) {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
                request.onsuccess = e => resolve(e.target.result.transaction(storeName, mode).objectStore(storeName));
            });
        }

        // 3. INITIALIZE AI
        async function init() {
            try {
                classifier = knnClassifier.create();
                net = await mobilenet.load(); // This gets cached by Service Worker
                
                const store = await accessDB("readonly");
                const savedInv = await new Promise(r => store.get("inv").onsuccess = e => r(e.target.result));
                const savedBrain = await new Promise(r => store.get("brain").onsuccess = e => r(e.target.result));

                if (savedInv) inventory = savedInv;
                if (savedBrain) {
                    const dataset = JSON.parse(savedBrain);
                    Object.keys(dataset).forEach(key => {
                        dataset[key] = tf.tensor2d(dataset[key].data, dataset[key].shape);
                    });
                    classifier.setClassifierDataset(dataset);
                }

                document.getElementById('loading-overlay').style.display = 'none';
                startCam(vScan);
                loop();
            } catch (e) {
                alert("Please connect to internet for the first load.");
            }
        }

        async function startCam(v) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                v.srcObject = s;
            } catch (e) { alert("Camera error: " + e); }
        }

        function tab(id, el) {
            scanActive = (id === 'scan-screen');
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            if(id === 'add-screen') startCam(vTrain);
            if(id === 'list-screen') renderList();
        }

        // 4. TRAINING LOGIC
        const tBtn = document.getElementById('t-btn');
        const startT = (e) => { e.preventDefault(); if(!document.getElementById('i-name').value) return alert("Enter name"); isTraining = true; tBtn.classList.add('active'); trainLoop(); };
        const stopT = () => { isTraining = false; tBtn.classList.remove('active'); };
        
        tBtn.onmousedown = startT; tBtn.onmouseup = stopT;
        tBtn.ontouchstart = startT; tBtn.ontouchend = stopT;

        async function trainLoop() {
            if(!isTraining) return;
            const img = await net.infer(vTrain, 'conv_preds');
            classifier.addExample(img, document.getElementById('i-name').value);
            setTimeout(trainLoop, 100);
        }

        async function saveProduct() {
            const name = document.getElementById('i-name').value;
            inventory[name] = { buy: document.getElementById('i-buy').value, sell: document.getElementById('i-sell').value };
            
            const dataset = classifier.getClassifierDataset();
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });

            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            store.put(JSON.stringify(brainObj), "brain");
            alert("Product and AI Saved Offline!");
            location.reload();
        }

        // 5. SCANNING LOOP (Throttled for speed)
        async function loop() {
            if (scanActive && classifier.getNumClasses() > 0) {
                const img = await net.infer(vScan, 'conv_preds');
                const res = await classifier.predictClass(img);
                if (res.confidences[res.label] > 0.85) {
                    const item = inventory[res.label];
                    if(item) {
                        document.getElementById('d-name').innerText = res.label.toUpperCase();
                        document.getElementById('d-buy').innerText = item.buy;
                        document.getElementById('d-sell').innerText = item.sell;
                        document.getElementById('result').classList.remove('hidden');
                        document.getElementById('status').innerText = "Match Found!";
                    }
                } else {
                    document.getElementById('result').classList.add('hidden');
                    document.getElementById('status').innerText = "Scanning...";
                }
            }
            setTimeout(() => requestAnimationFrame(loop), 300);
        }

        // 6. EDIT/DELETE LOGIC
        function renderList() {
            const list = document.getElementById('inv-list');
            list.innerHTML = Object.keys(inventory).map(k => `
                <div class="inv-item">
                    <div><b>${k}</b><br><small>$${inventory[k].buy} -> $${inventory[k].sell}</small></div>
                    <button class="del-btn" onclick="deleteItem('${k}')">Delete</button>
                </div>
            `).join('');
        }

        async function deleteItem(name) {
            if(!confirm("Delete this item?")) return;
            delete inventory[name];
            const dataset = classifier.getClassifierDataset();
            if(dataset[name]) {
                dataset[name].dispose();
                delete dataset[name];
            }
            // Clear and rebuild classifier
            classifier.setClassifierDataset(dataset);
            
            // Save updated state
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });
            store.put(JSON.stringify(brainObj), "brain");
            renderList();
        }

        init();
    </script>
</body>
</html>
