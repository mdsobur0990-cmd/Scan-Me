<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI</title>
    <!-- Basic PWA Support -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    
    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc;
            --success: #22c55e; 
            --danger: #ef4444; 
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            overflow: hidden; 
            touch-action: manipulation;
        }

        /* Loading Screen */
        #loading-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* App Header */
        .header { background: var(--card); padding: 15px; text-align: center; font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; border-bottom: 1px solid #334155; }

        .container { height: calc(100vh - 140px); overflow-y: auto; padding: 15px; box-sizing: border-box; }

        /* Main Scan Screen - Large Ratio */
        #scan-screen { padding: 0; position: relative; overflow: hidden; }
        .video-container { width: 100%; height: 75vh; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Scan Button */
        .scan-btn-container {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .btn-scan-small { 
            background: var(--primary); color: white; border: none; 
            width: 80px; height: 80px; border-radius: 50%; font-weight: bold;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); border: 4px solid rgba(255,255,255,0.2);
            transition: transform 0.1s, background 0.3s;
        }
        .btn-scan-small:active { transform: scale(0.9); background: #1d4ed8; }

        /* Floating Info Badge */
        #result-overlay {
            position: absolute; top: 20px; left: 20px; right: 20px;
            background: rgba(30, 41, 59, 0.9); padding: 15px; border-radius: 15px;
            backdrop-filter: blur(10px); border-left: 5px solid var(--success);
            transform: translateY(-120%); transition: 0.3s ease;
        }
        #result-overlay.visible { transform: translateY(0); }

        /* Forms & Cards */
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #334155; 
            border-radius: 10px; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box;
        }
        .btn-action { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px; color: white;
        }
        .btn-save { background: var(--success); }
        .btn-train { background: var(--primary); margin-bottom: 15px; }

        /* Inventory List */
        .inv-item { 
            background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .inv-info b { font-size: 1.1rem; display: block; }
        .inv-info small { color: #94a3b8; }
        .inv-controls { display: flex; gap: 8px; }
        .btn-icon { padding: 8px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: bold; }
        .btn-del { background: #450a0a; color: #f87171; }
        .btn-edit { background: #1e3a8a; color: #60a5fa; }

        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--card); display: flex; border-top: 1px solid #334155; 
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #64748b; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="load-status" style="margin-top:20px;">Waking up AI...</p>
    </div>

    <div class="header">PRO SCANNER AI</div>

    <!-- SCAN SCREEN -->
    <div id="scan-screen" class="view">
        <div id="result-overlay">
            <div id="d-name" style="font-size:1.2rem; font-weight:900;">PRODUCT NAME</div>
            <div style="display:flex; justify-content: space-between; margin-top:5px;">
                <span style="color:var(--danger)">Buy: $<span id="d-buy">0</span></span>
                <span style="color:var(--success); font-weight:bold;">Sell: $<span id="d-sell">0</span></span>
            </div>
        </div>

        <div class="video-container">
            <video id="v-scan" autoplay playsinline muted></video>
        </div>

        <div class="scan-btn-container">
            <div id="scan-hint" style="font-size:14px; text-shadow: 1px 1px 2px #000;">Hold button to identify</div>
            <button class="btn-scan-small" id="hold-scan-btn">SCAN</button>
        </div>
    </div>

    <!-- ADD/EDIT SCREEN -->
    <div id="add-screen" class="container view hidden">
        <div class="card">
            <h3 id="form-title">Add Product</h3>
            <input type="text" id="i-name" placeholder="Name (e.g. Red Soda)">
            <div style="display:flex; gap:10px;">
                <input type="number" id="i-buy" placeholder="Buy $">
                <input type="number" id="i-sell" placeholder="Sell $">
            </div>
            
            <div style="border-radius:15px; overflow:hidden; height:150px; margin-top:10px;">
                <video id="v-train" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            </div>
            <p style="font-size:12px; color:#94a3b8; text-align:center;">Hold Train button while showing the item to the camera</p>
            
            <button class="btn-action btn-train" id="t-btn">HOLD TO TRAIN</button>
            <button onclick="saveProduct()" class="btn-action btn-save">SAVE PRODUCT</button>
            <button onclick="cancelEdit()" id="cancel-btn" class="btn-action hidden" style="background:#475569">CANCEL EDIT</button>
        </div>
    </div>

    <!-- INVENTORY SCREEN -->
    <div id="list-screen" class="container view hidden">
        <h3 style="margin-left:10px;">Inventory</h3>
        <div id="inv-list"></div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('scan-screen', this)"><span>📷</span><span>Scan</span></div>
        <div class="nav-item" onclick="tab('add-screen', this)"><span>➕</span><span>Add</span></div>
        <div class="nav-item" onclick="tab('list-screen', this)"><span>📦</span><span>Items</span></div>
    </div>

    <script>
        let classifier, net, inventory = {}, isTraining = false, isScanning = false, scanActive = true;
        let editingKey = null;

        const dbName = "ScannerAI_V2", storeName = "DataStore";

        // Database Access
        async function accessDB(mode) {
            return new Promise((resolve) => {
                const request = indexedDB.open(dbName, 2);
                request.onupgradeneeded = e => e.target.result.createObjectStore(storeName);
                request.onsuccess = e => resolve(e.target.result.transaction(storeName, mode).objectStore(storeName));
            });
        }

        // Initialize App
        async function init() {
            try {
                classifier = knnClassifier.create();
                net = await mobilenet.load();
                
                const store = await accessDB("readonly");
                const savedInv = await new Promise(r => store.get("inv").onsuccess = e => r(e.target.result));
                const savedBrain = await new Promise(r => store.get("brain").onsuccess = e => r(e.target.result));

                if (savedInv) inventory = savedInv;
                if (savedBrain) {
                    const dataset = JSON.parse(savedBrain);
                    Object.keys(dataset).forEach(key => {
                        dataset[key] = tf.tensor2d(dataset[key].data, dataset[key].shape);
                    });
                    classifier.setClassifierDataset(dataset);
                }

                document.getElementById('loading-overlay').style.display = 'none';
                startCam(document.getElementById('v-scan'));
                loop();
            } catch (e) {
                console.error(e);
                document.getElementById('load-status').innerText = "Please enable Camera & Refresh";
            }
        }

        async function startCam(v) {
            if (v.srcObject) return; 
            try {
                const s = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                v.srcObject = s;
            } catch (e) { alert("Camera failed to start"); }
        }

        function tab(id, el) {
            scanActive = (id === 'scan-screen');
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            el.classList.add('active');
            
            if(id === 'add-screen') startCam(document.getElementById('v-train'));
            if(id === 'scan-screen') { startCam(document.getElementById('v-scan')); hideResult(); }
            if(id === 'list-screen') renderList();
        }

        function hideResult() {
            document.getElementById('result-overlay').classList.remove('visible');
            document.getElementById('scan-hint').innerText = "Hold button to identify";
        }

        // --- SCAN LOGIC ---
        const scanBtn = document.getElementById('hold-scan-btn');
        const handleScanStart = (e) => { e.preventDefault(); isScanning = true; hideResult(); };
        const handleScanEnd = () => { isScanning = false; };

        scanBtn.addEventListener('mousedown', handleScanStart);
        scanBtn.addEventListener('touchstart', handleScanStart);
        window.addEventListener('mouseup', handleScanEnd);
        window.addEventListener('touchend', handleScanEnd);

        // --- TRAINING LOGIC ---
        const tBtn = document.getElementById('t-btn');
        const handleTrainStart = (e) => {
            e.preventDefault();
            if(!document.getElementById('i-name').value) return alert("Enter name first");
            isTraining = true;
            tBtn.innerText = "TRAINING... (Keep moving item)";
            trainLoop();
        };
        const handleTrainEnd = () => { 
            isTraining = false; 
            tBtn.innerText = "HOLD TO TRAIN"; 
        };

        tBtn.addEventListener('mousedown', handleTrainStart);
        tBtn.addEventListener('touchstart', handleTrainStart);
        window.addEventListener('mouseup', handleTrainEnd);
        window.addEventListener('touchend', handleTrainEnd);

        async function trainLoop() {
            if(!isTraining) return;
            const v = document.getElementById('v-train');
            const img = await net.infer(v, 'conv_preds');
            classifier.addExample(img, document.getElementById('i-name').value);
            setTimeout(trainLoop, 100);
        }

        // --- DATA PERSISTENCE ---
        async function saveProduct() {
            const name = document.getElementById('i-name').value.trim();
            const buy = document.getElementById('i-buy').value;
            const sell = document.getElementById('i-sell').value;

            if(!name || !buy || !sell) return alert("Fill all fields");
            if(classifier.getNumClasses() === 0) return alert("Train the AI first");

            // If we edited the name, delete the old entry
            if (editingKey && editingKey !== name) {
                delete inventory[editingKey];
                // Note: TF Classifier doesn't support easy class renaming, 
                // so we usually just add the new examples under the new name.
            }

            inventory[name] = { buy, sell };
            
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            
            // Save AI Brain
            const dataset = classifier.getClassifierDataset();
            const brainObj = {};
            Object.keys(dataset).forEach(key => {
                brainObj[key] = { data: Array.from(dataset[key].dataSync()), shape: dataset[key].shape };
            });
            store.put(JSON.stringify(brainObj), "brain");

            alert("Saved successfully!");
            cancelEdit();
            tab('list-screen', document.querySelectorAll('.nav-item')[2]);
        }

        // --- INVENTORY MANAGEMENT ---
        function renderList() {
            const list = document.getElementById('inv-list');
            const keys = Object.keys(inventory);
            
            if (keys.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:50px; color:#64748b;">No items yet</div>';
                return;
            }

            list.innerHTML = keys.map(k => `
                <div class="inv-item">
                    <div class="inv-info">
                        <b>${k}</b>
                        <small>Buy: $${inventory[k].buy} | Sell: $${inventory[k].sell}</small>
                    </div>
                    <div class="inv-controls">
                        <button class="btn-icon btn-edit" onclick="editItem('${k}')">Edit</button>
                        <button class="btn-icon btn-del" onclick="deleteItem('${k}')">X</button>
                    </div>
                </div>
            `).join('');
        }

        function editItem(name) {
            editingKey = name;
            const item = inventory[name];
            document.getElementById('i-name').value = name;
            document.getElementById('i-buy').value = item.buy;
            document.getElementById('i-sell').value = item.sell;
            
            document.getElementById('form-title').innerText = "Edit Product";
            document.getElementById('cancel-btn').classList.remove('hidden');
            tab('add-screen', document.querySelectorAll('.nav-item')[1]);
        }

        function cancelEdit() {
            editingKey = null;
            document.getElementById('i-name').value = '';
            document.getElementById('i-buy').value = '';
            document.getElementById('i-sell').value = '';
            document.getElementById('form-title').innerText = "Add Product";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        async function deleteItem(name) {
            if(!confirm(`Delete ${name}?`)) return;
            delete inventory[name];
            const store = await accessDB("readwrite");
            store.put(inventory, "inv");
            renderList();
        }

        // --- MAIN AI LOOP ---
        async function loop() {
            if (scanActive && isScanning && classifier.getNumClasses() > 0) {
                try {
                    const v = document.getElementById('v-scan');
                    const img = await net.infer(v, 'conv_preds');
                    const res = await classifier.predictClass(img);
                    const confidence = res.confidences[res.label];

                    if (confidence > 0.85) {
                        const item = inventory[res.label];
                        if (item) {
                            document.getElementById('d-name').innerText = res.label;
                            document.getElementById('d-buy').innerText = item.buy;
                            document.getElementById('d-sell').innerText = item.sell;
                            document.getElementById('result-overlay').classList.add('visible');
                            document.getElementById('scan-hint').innerText = "Match Found!";
                        }
                    } else {
                        document.getElementById('scan-hint').innerText = "Searching...";
                    }
                } catch(e) {}
            }
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
