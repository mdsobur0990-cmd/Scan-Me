<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scanner AI Ultra</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1022/1022313.png">
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered'))
            .catch(err => console.log('SW Failed', err));
        });
      }
    </script>

    <!-- AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4"></script>
    
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #22c55e; --danger: #ef4444; --border: #e2e8f0; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; }
        #loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 45px; height: 45px; border: 5px solid var(--border); border-bottom-color: var(--primary); border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        .header { background: #fff; padding: 10px; text-align: center; font-weight: 800; border-bottom: 1px solid var(--border); font-size: 15px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #fff; display: flex; border-top: 1px solid var(--border); z-index: 90; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 18px; margin-bottom: 2px; font-style: normal; }
        .screen { height: calc(100vh - 135px); overflow-y: auto; padding: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .video-wrapper { width: 100%; border-radius: 18px; overflow: hidden; background: #000; position: relative; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #v-scan-container { height: 42vh; margin-bottom: 8px; }
        #v-train-container { height: 140px; margin: 6px 0; } 
        video { width: 100%; height: 100%; object-fit: cover; }
        #result-card { background: #fff; border-radius: 15px; padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid var(--border); text-align: center; transform: translateY(5px); opacity: 0; transition: 0.2s ease; }
        #result-card.visible { transform: translateY(0); opacity: 1; }
        .price-grid { display: flex; justify-content: space-around; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .price-item span { font-size: 18px; font-weight: 900; }
        .scan-trigger-container { position: absolute; bottom: 85px; left: 0; right: 0; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .btn-round-scan { width: 70px; height: 70px; border-radius: 50%; background: var(--primary); border: 4px solid #fff; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); color: #fff; font-weight: 800; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; pointer-events: auto; }
        .btn-round-scan:active { transform: scale(0.85); background: #1d4ed8; }
